services:
  rrkit:
    # Use the published image, or build locally by uncommenting `build: .`.
    image: zesigernet/rrkit:latest
    # build: .
    container_name: rrkit
    ports:
      - "3000:3000"
    volumes:
      # The ONLY thing stored on the host: the SQLite database (+ WAL sidecars).
      # All session recordings live in your S3 bucket; configure it in the dashboard.
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 30s
      timeout: 3s
      retries: 5
